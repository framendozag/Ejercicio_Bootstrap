<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Enviar Dinero</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="bg-dark d-flex align-items-center justify-content-center vh-100">

  <div class="card shadow-lg p-4" style="width: 100%; max-width: 420px;">
    <div class="text-center mb-4">
      <div class="wallet-icon mb-2">📤</div>
      <h2 class="fw-bold">Enviar Dinero</h2>
    </div>

    <!-- Buscar contacto -->
    <form class="mb-3">
      <label class="form-label fw-semibold">Buscar en agenda</label>
      <div class="input-group">
        <input type="text" class="form-control" placeholder="Nombre o email..." />
        <button class="btn btn-primary" type="button">Buscar</button>
      </div>
    </form>

    <!-- Lista de contactos -->
    <p class="fw-semibold mb-2">Contactos frecuentes</p>
    <ul class="list-group mb-3">
      <li class="list-group-item d-flex justify-content-between align-items-center">
        <span>👤 María García</span>
        <button class="btn btn-sm btn-primary">Enviar</button>
      </li>
      <li class="list-group-item d-flex justify-content-between align-items-center">
        <span>👤 Carlos López</span>
        <button class="btn btn-sm btn-primary">Enviar</button>
      </li>
      <li class="list-group-item d-flex justify-content-between align-items-center">
        <span>👤 Ana Martínez</span>
        <button class="btn btn-sm btn-primary">Enviar</button>
      </li>
    </ul>

    <div class="d-grid gap-2">
      <button class="btn btn-outline-success fw-bold" data-bs-toggle="modal" data-bs-target="#modalContacto">
        ➕ Agregar nuevo contacto
      </button>
      <a href="menu.html" class="btn btn-outline-secondary">Volver al Menú</a>
    </div>
  </div>

  <!-- Modal nuevo contacto -->
  <div class="modal fade" id="modalContacto" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title fw-bold">Nuevo Contacto</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <form>
            <div class="mb-3">
              <label class="form-label">Nombre</label>
              <input type="text" class="form-control" placeholder="Nombre completo" />
            </div>
            <div class="mb-3">
              <label class="form-label">Email</label>
              <input type="email" class="form-control" placeholder="correo@ejemplo.com" />
            </div>
            <div class="mb-3">
              <label class="form-label">Teléfono</label>
              <input type="tel" class="form-control" placeholder="+56 9 1234 5678" />
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button class="btn btn-success" data-bs-dismiss="modal">Guardar Contacto</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
