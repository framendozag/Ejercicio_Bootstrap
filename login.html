<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inicio de Sesión</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="bg-dark d-flex align-items-center justify-content-center vh-100">

  <div class="card shadow-lg p-4" style="width: 100%; max-width: 420px;">
    <div class="text-center mb-4">
      <div class="wallet-icon mb-2">💳</div>
      <h2 class="fw-bold">Inicio de Sesión</h2>
      <p class="text-muted">Bienvenido a tu billetera digital</p>
    </div>

    <div id="mensaje" class="alert d-none mb-3"></div>

    <form id="formLogin">
      <div class="mb-3">
        <label class="form-label fw-semibold">Email</label>
        <input type="email" id="email" class="form-control" placeholder="correo@ejemplo.com" required />
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold">Contraseña</label>
        <input type="password" id="password" class="form-control" placeholder="••••••••" required />
      </div>
      <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">Iniciar Sesión</button>
    </form>
  </div>

  <script>
    const USUARIO = "juan@ejemplo.com";
    const CLAVE   = "123456";

    document.getElementById("formLogin").addEventListener("submit", function(e) {
      e.preventDefault();

      const email    = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();
      const mensaje  = document.getElementById("mensaje");

      if (email === USUARIO && password === CLAVE) {
        mensaje.className = "alert alert-success";
        mensaje.textContent = "✅ Credenciales correctas. Redirigiendo...";
        mensaje.classList.remove("d-none");

        // Inicializar saldo y movimientos si no existen
        if (!localStorage.getItem("saldo")) {
          localStorage.setItem("saldo", "2500");
        }
        if (!localStorage.getItem("movimientos")) {
          localStorage.setItem("movimientos", JSON.stringify([
            { descripcion: "Saldo inicial", monto: 2500, tipo: "ingreso", fecha: "01 Mar 2026" }
          ]));
        }

        setTimeout(() => window.location.href = "menu.html", 1500);
      } else {
        mensaje.className = "alert alert-danger";
        mensaje.textContent = "❌ Email o contraseña incorrectos. Intenta nuevamente.";
        mensaje.classList.remove("d-none");
      }
    });
  </script>

</body>
</html>
