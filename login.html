<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inicio de Sesión</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="bg-dark d-flex align-items-center justify-content-center vh-100">

  <div class="card shadow-lg p-4" style="width: 100%; max-width: 420px;">
    <div class="text-center mb-4">
      <div class="wallet-icon mb-2">💳</div>
      <h2 class="fw-bold">Inicio de Sesión</h2>
      <p class="text-muted">Bienvenido a tu billetera digital</p>
    </div>

    <form action="menu.html">
      <div class="mb-3">
        <label class="form-label fw-semibold">Email</label>
        <input type="email" class="form-control" placeholder="correo@ejemplo.com" required />
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold">Contraseña</label>
        <input type="password" class="form-control" placeholder="••••••••" required />
      </div>
      <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">Iniciar Sesión</button>
    </form>
  </div>

</body>
</html>
