<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Depositar</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="bg-dark d-flex align-items-center justify-content-center vh-100">

  <div class="card shadow-lg p-4" style="width: 100%; max-width: 420px;">
    <div class="text-center mb-4">
      <div class="wallet-icon mb-2">💰</div>
      <h2 class="fw-bold">Depositar</h2>
      <p class="text-muted">Ingresa el monto que deseas depositar</p>
    </div>

    <form action="menu.html">
      <div class="mb-3">
        <label class="form-label fw-semibold">Monto a depositar</label>
        <div class="input-group">
          <span class="input-group-text">$</span>
          <input type="number" class="form-control form-control-lg" placeholder="0.00" min="1" required />
        </div>
      </div>

      <div class="mb-4">
        <label class="form-label fw-semibold">Método de pago</label>
        <select class="form-select">
          <option>Tarjeta de crédito</option>
          <option>Tarjeta de débito</option>
          <option>Transferencia bancaria</option>
        </select>
      </div>

      <div class="d-grid gap-2">
        <button type="submit" class="btn btn-success py-2 fw-bold">Realizar Depósito</button>
        <a href="menu.html" class="btn btn-outline-secondary">Volver al Menú</a>
      </div>
    </form>
  </div>

</body>
</html>
