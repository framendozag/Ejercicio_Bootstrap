<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Menú Principal</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="bg-dark d-flex align-items-center justify-content-center vh-100">

  <div class="card shadow-lg p-4 text-center" style="width: 100%; max-width: 420px;">
    <h2 class="fw-bold mb-1">Menú Principal</h2>
    <p class="text-muted mb-4">Hola, Juan 👋</p>

    <div class="balance-card rounded p-4 mb-4">
      <p class="text-white-50 mb-1">Saldo disponible</p>
      <h1 class="text-white fw-bold" id="saldoDisplay">$0,00</h1>
    </div>

    <div id="mensajeRedireccion" class="alert alert-info d-none mb-3"></div>

    <div class="d-grid gap-3">
      <button onclick="redirigir('deposit.html', 'Depositar')"        class="btn btn-success py-2 fw-bold fs-6">💰 Depositar</button>
      <button onclick="redirigir('sendmoney.html', 'Enviar Dinero')"  class="btn btn-primary py-2 fw-bold fs-6">📤 Enviar Dinero</button>
      <button onclick="redirigir('transactions.html', 'Últimos Movimientos')" class="btn btn-outline-secondary py-2 fw-bold fs-6">📋 Últimos Movimientos</button>
    </div>
  </div>

  <script>
    // Mostrar saldo actualizado
    const saldo = parseFloat(localStorage.getItem("saldo")) || 0;
    document.getElementById("saldoDisplay").textContent =
      "$" + saldo.toLocaleString("es-AR", { minimumFractionDigits: 2 });

    function redirigir(url, nombre) {
      const msg = document.getElementById("mensajeRedireccion");
      msg.textContent = `⏳ Redirigiendo a ${nombre}...`;
      msg.classList.remove("d-none");
      setTimeout(() => window.location.href = url, 1200);
    }
  </script>

</body>
</html>
